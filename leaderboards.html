<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBN Stats | Historical Kentucky Leaderboards</title>
  <meta name="description" content="Historical Kentucky player leaderboards across loaded seasons, including PPG, TS%, player rating, net rating, shooting efficiency, and freshman seasons.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/charts.css">
  <link rel="stylesheet" href="css/print.css">

  <style>
    .leaderboard-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
    }

    .leaderboard-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .leaderboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 520px), 1fr));
      gap: 20px;
      align-items: start;
    }

    .leaderboard-card {
      display: grid;
      gap: 14px;
      min-height: 100%;
      min-width: 0;
    }

    .leaderboard-card__top {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      justify-content: space-between;
    }

    .leaderboard-card__title {
      margin: 0;
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 1.2rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .leaderboard-card__copy {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .leaderboard-badge {
      flex-shrink: 0;
      border: 1px solid rgba(74, 144, 217, 0.28);
      border-radius: 999px;
      color: var(--uk-light-blue);
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1;
      padding: 8px 10px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .leaderboard-list {
      display: grid;
      gap: 0;
      min-width: 0;
      overflow: hidden;
      border: 1px solid rgba(74, 144, 217, 0.12);
      border-radius: var(--radius-sm);
    }

    .leaderboard-list__head,
    .leaderboard-list__row {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) 82px 104px;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .leaderboard-list__head {
      padding: 14px 16px;
      background:
        linear-gradient(180deg, rgba(74, 144, 217, 0.16), rgba(74, 144, 217, 0.03)),
        rgba(8, 15, 31, 0.96);
      color: var(--text-secondary);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .leaderboard-list__row {
      padding: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .leaderboard-list__row:nth-child(odd) {
      background: rgba(255, 255, 255, 0.015);
    }

    .leaderboard-list__rank,
    .leaderboard-list__season,
    .leaderboard-list__value {
      color: var(--uk-white);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .leaderboard-list__rank {
      text-align: center;
    }

    .leaderboard-list__season,
    .leaderboard-list__value {
      text-align: right;
      white-space: nowrap;
    }

    .leaderboard-list__value {
      color: #d8e7ff;
    }

    .leaderboard-player {
      display: grid;
      gap: 4px;
      align-items: start;
      min-width: 0;
    }

    .leaderboard-player__name {
      color: var(--text-primary);
      font-weight: 700;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .leaderboard-player__meta {
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    .leaderboard-progress {
      color: var(--text-muted);
      font-size: 0.92rem;
    }

    .leaderboard-progress strong {
      color: var(--text-primary);
    }

    @media (max-width: 768px) {
      .leaderboard-grid {
        grid-template-columns: 1fr;
      }

      .leaderboard-card__top,
      .leaderboard-controls {
        align-items: stretch;
        flex-direction: column;
      }

      .leaderboard-list__head,
      .leaderboard-list__row {
        grid-template-columns: 40px minmax(0, 1fr) 70px 86px;
        gap: 8px;
        padding-left: 12px;
        padding-right: 12px;
      }

      .leaderboard-list__head {
        font-size: 0.68rem;
        letter-spacing: 0.08em;
      }
    }
  </style>
</head>
<body data-page="leaderboards">
  <main id="main-content" class="page-shell">
    <div class="export-buttons" style="margin-bottom: 24px;">
      <button class="btn btn--secondary" type="button" data-export-image data-export-target="main-content">Save as Image</button>
      <button class="btn btn--ghost" type="button" data-print-page>Print</button>
    </div>

    <section class="section">
      <div class="hero-banner">
        <span class="eyebrow">Historical Leaderboards</span>
        <h1 class="hero-title">Kentucky Player Seasons</h1>
        <p class="lead">Top PPG seasons, best TS%, best college player rating, best net rating, most efficient shooters, and best freshman seasons across loaded Kentucky data.</p>
      </div>
    </section>

    <section class="section">
      <div class="leaderboard-controls">
        <div class="leaderboard-progress" id="leaderboard-progress">Preparing historical leaderboards...</div>
      </div>
    </section>

    <section class="section">
      <div id="leaderboard-summary" class="leaderboard-summary">
        <div class="card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--stat"></div></div>
        <div class="card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--stat"></div></div>
        <div class="card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--stat"></div></div>
      </div>
    </section>

    <section class="section">
      <div id="leaderboard-grid" class="leaderboard-grid">
        <article class="card leaderboard-card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--text"></div><div class="skeleton skeleton--stat"></div></article>
        <article class="card leaderboard-card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--text"></div><div class="skeleton skeleton--stat"></div></article>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/print.js"></script>
  <script>
    const TEAM_NAME = "Kentucky";
    const LOADED_SEASONS = Array.from({ length: 2026 - 2000 + 1 }, (_, index) => 2026 - index);
    const BOARD_LIMIT = 10;

    let leaderboardRows = [];

    function getHelpers() {
      return {
        api: window.BBNStatsApi || {},
        utils: window.BBNStatsUtils || {},
        printer: window.BBNStatsPrint || {}
      };
    }

    function safeArray(value) {
      if (Array.isArray(value)) return value;
      if (value && Array.isArray(value.value)) return value.value;
      return [];
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function fmtNum(value, digits = 1) {
      return getHelpers().utils.fmtNum ? getHelpers().utils.fmtNum(value, digits) : Number(value || 0).toFixed(digits);
    }

    function fmtPct(value) {
      return getHelpers().utils.fmtPct ? getHelpers().utils.fmtPct(value) : `${Number(value || 0).toFixed(1)}%`;
    }

    function seasonLabel(season) {
      return `${season - 1}-${String(season).slice(-2)}`;
    }

    function perGame(total, games) {
      const gamesNum = Number(games || 0);
      return gamesNum ? Number(total || 0) / gamesNum : 0;
    }

    function shotPct(stat) {
      const raw = Number(stat?.pct);
      if (Number.isFinite(raw) && raw > 0) {
        return Math.abs(raw) <= 1 ? raw * 100 : raw;
      }

      const made = Number(stat?.made || 0);
      const attempted = Number(stat?.attempted || 0);
      return attempted ? (made / attempted) * 100 : 0;
    }

    function getClassYear(player, season) {
      if (typeof getHelpers().utils.getPlayerClassYear === "function") {
        return getHelpers().utils.getPlayerClassYear(player, season);
      }

      return "";
    }

    function playerUrl(row) {
      const url = new URL("player.html", window.location.href);
      url.searchParams.set("id", String(row.athleteId));
      url.searchParams.set("season", String(row.season));
      return url.toString();
    }

    function normalizeSeasonRow(row, season) {
      const games = Number(row.games || 0);
      const fieldGoalAttempts = Number(row.fieldGoals?.attempted || 0);
      const threeAttempts = Number(row.threePointFieldGoals?.attempted || 0);
      const freeThrowAttempts = Number(row.freeThrows?.attempted || 0);
      const trueShooting = Number(row.trueShootingPct || 0);
      const effectiveFieldGoal = Number(row.effectiveFieldGoalPct || 0);
      const classYear = getClassYear(row, season);
      const ppg = perGame(row.points, games);
      const mpg = perGame(row.minutes, games);
      const rpg = perGame(row.rebounds?.total, games);
      const apg = perGame(row.assists, games);
      const spg = perGame(row.steals, games);
      const bpg = perGame(row.blocks, games);
      const tpg = perGame(row.turnovers, games);
      const fgaPerGame = perGame(fieldGoalAttempts, games);
      const threePerGame = perGame(threeAttempts, games);
      const rating = getHelpers().utils.calculateCollegePlayerRating
        ? getHelpers().utils.calculateCollegePlayerRating(row)
        : 0;
      const efficiencyScore = (
        (Math.abs(trueShooting) <= 1 ? trueShooting * 100 : trueShooting) * 0.44
        + (Math.abs(effectiveFieldGoal) <= 1 ? effectiveFieldGoal * 100 : effectiveFieldGoal) * 0.28
        + shotPct(row.threePointFieldGoals) * 0.12
        + shotPct(row.freeThrows) * 0.08
        + Math.min(fgaPerGame, 12) * 1.4
        + Math.min(freeThrowAttempts / Math.max(games, 1), 7) * 0.8
      );

      return {
        ...row,
        season,
        classYear,
        games,
        ppg,
        mpg,
        fgaPerGame,
        threePerGame,
        rating,
        trueShooting,
        effectiveFieldGoal,
        fieldGoalPct: shotPct(row.fieldGoals),
        twoPointPct: shotPct(row.twoPointFieldGoals),
        threePointPct: shotPct(row.threePointFieldGoals),
        freeThrowPct: shotPct(row.freeThrows),
        netRating: Number(row.netRating || 0),
        offensiveRating: Number(row.offensiveRating || 0),
        defensiveRating: Number(row.defensiveRating || 0),
        usage: Number(row.usage || 0),
        porpag: Number(row.PORPAG || row.porpag || 0),
        assistsTurnoverRatio: Number(row.assistsTurnoverRatio || 0),
        freeThrowRate: Number(row.freeThrowRate || 0),
        offensiveReboundPct: Number(row.offensiveReboundPct || 0),
        winShares: Number(row.winShares?.total || 0),
        wsPer40: Number(row.winShares?.totalPer40 || 0),
        points: Number(row.points || 0),
        rebounds: Number(row.rebounds?.total || 0),
        assists: Number(row.assists || 0),
        steals: Number(row.steals || 0),
        blocks: Number(row.blocks || 0),
        turnovers: Number(row.turnovers || 0),
        minutes: Number(row.minutes || 0),
        starts: Number(row.gamesStarted || row.starts || 0),
        fieldGoalsMade: Number(row.fieldGoals?.made || 0),
        fieldGoalAttempts,
        twoPointMade: Number(row.twoPointFieldGoals?.made || 0),
        twoPointAttempts: Number(row.twoPointFieldGoals?.attempted || 0),
        threePointMade: Number(row.threePointFieldGoals?.made || 0),
        threeAttempts,
        freeThrowsMade: Number(row.freeThrows?.made || 0),
        freeThrowAttempts,
        rpg,
        apg,
        spg,
        bpg,
        tpg,
        efficiencyScore
      };
    }

    function sortByMetric(rows, key, ascending = false) {
      return rows
        .slice()
        .filter((row) => Number.isFinite(Number(row[key])))
        .sort((left, right) => {
          const diff = ascending
            ? Number(left[key]) - Number(right[key])
            : Number(right[key]) - Number(left[key]);
          if (diff !== 0) return diff;
          return String(left.name || "").localeCompare(String(right.name || ""));
        })
        .slice(0, BOARD_LIMIT);
    }

    function hasAttempts(key) {
      return (row) => Number(row[key] || 0) > 0;
    }

    function board(id, title, note, badge, rows, key, value, detail, ascending = false) {
      return {
        id,
        title,
        note,
        badge,
        rows: sortByMetric(rows, key, ascending),
        value,
        detail
      };
    }

    function buildBoards(rows) {
      const all = rows.filter((row) => row.games > 0);
      const fieldGoalRows = all.filter(hasAttempts("fieldGoalAttempts"));
      const twoPointRows = all.filter(hasAttempts("twoPointAttempts"));
      const threePointRows = all.filter(hasAttempts("threeAttempts"));
      const freeThrowRows = all.filter(hasAttempts("freeThrowAttempts"));
      const trueShootingRows = all.filter((row) => Number(row.trueShooting || 0) > 0);
      const defensiveRows = all.filter((row) => Number(row.defensiveRating || 0) > 0);
      const usageRows = all.filter((row) => Number(row.usage || 0) > 0);
      const astToRows = all.filter((row) => Number(row.assistsTurnoverRatio || 0) > 0);
      const orebRows = all.filter((row) => Number(row.offensiveReboundPct || 0) > 0);
      const porpagRows = all.filter((row) => Number(row.porpag || 0) !== 0);
      const winShareRows = all.filter((row) => Number(row.winShares || 0) > 0);
      const wsPer40Rows = all.filter((row) => Number(row.wsPer40 || 0) > 0);
      const freshmen = all.filter((row) => row.classYear === "Fr.");
      const perGameDetail = (row) => `${fmtNum(row.mpg, 1)} MPG`;
      const totalDetail = (stat) => (row) => `${row.games} G | ${fmtNum(perGame(row[stat], row.games), 1)}/G`;
      const shotDetail = (made, attempts) => (row) => `${row[made]}-${row[attempts]}`;

      return [
        board("ppg", "Top PPG Seasons", "Scoring average by player season.", "PPG", all, "ppg", (row) => `${fmtNum(row.ppg, 1)} PPG`, perGameDetail),
        board("points", "Most Points", "Total points in a Kentucky season.", "PTS", all, "points", (row) => fmtNum(row.points, 0), totalDetail("points")),
        board("rpg", "Top RPG Seasons", "Rebounding average by player season.", "RPG", all, "rpg", (row) => `${fmtNum(row.rpg, 1)} RPG`, perGameDetail),
        board("rebounds", "Most Rebounds", "Total rebounds in a Kentucky season.", "REB", all, "rebounds", (row) => fmtNum(row.rebounds, 0), totalDetail("rebounds")),
        board("apg", "Top APG Seasons", "Assist average by player season.", "APG", all, "apg", (row) => `${fmtNum(row.apg, 1)} APG`, perGameDetail),
        board("assists", "Most Assists", "Total assists in a Kentucky season.", "AST", all, "assists", (row) => fmtNum(row.assists, 0), totalDetail("assists")),
        board("spg", "Top SPG Seasons", "Steal average by player season.", "SPG", all, "spg", (row) => `${fmtNum(row.spg, 1)} SPG`, perGameDetail),
        board("steals", "Most Steals", "Total steals in a Kentucky season.", "STL", all, "steals", (row) => fmtNum(row.steals, 0), totalDetail("steals")),
        board("bpg", "Top BPG Seasons", "Block average by player season.", "BPG", all, "bpg", (row) => `${fmtNum(row.bpg, 1)} BPG`, perGameDetail),
        board("blocks", "Most Blocks", "Total blocks in a Kentucky season.", "BLK", all, "blocks", (row) => fmtNum(row.blocks, 0), totalDetail("blocks")),
        board("mpg", "Top MPG Seasons", "Minutes played average by player season.", "MPG", all, "mpg", (row) => `${fmtNum(row.mpg, 1)} MPG`, (row) => `${row.games} G`),
        board("minutes", "Most Minutes", "Total minutes played in a Kentucky season.", "MIN", all, "minutes", (row) => fmtNum(row.minutes, 0), totalDetail("minutes")),
        board("games", "Most Games", "Games played in a Kentucky season.", "G", all, "games", (row) => fmtNum(row.games, 0), (row) => `${fmtNum(row.mpg, 1)} MPG`),
        board("starts", "Most Starts", "Starts in a Kentucky season.", "GS", all, "starts", (row) => fmtNum(row.starts, 0), (row) => `${row.games} G`),
        board("rating", "Best College Player Rating", "BBN Stats composite rating for a player season.", "Rating", all, "rating", (row) => fmtNum(row.rating, 1), (row) => `${fmtNum(row.ppg, 1)} PPG`),
        board("porpag", "Best PORPAG", "Points over replacement per adjusted game.", "PORPAG", porpagRows, "porpag", (row) => fmtNum(row.porpag, 1), (row) => `${fmtNum(row.rating, 1)} rating`),
        board("win-shares", "Most Win Shares", "Total win shares in a Kentucky season.", "WS", winShareRows, "winShares", (row) => fmtNum(row.winShares, 1), (row) => `${fmtNum(row.wsPer40, 3)} WS/40`),
        board("ws40", "Best WS/40", "Win shares per 40 minutes.", "WS/40", wsPer40Rows, "wsPer40", (row) => fmtNum(row.wsPer40, 3), (row) => `${fmtNum(row.winShares, 1)} WS`),
        board("net", "Best Net Rating", "On-court adjusted point margin per 100 possessions.", "Net", all, "netRating", (row) => fmtNum(row.netRating, 1), (row) => `${fmtNum(row.offensiveRating, 1)} OffRtg`),
        board("offense", "Best Offensive Rating", "Offensive rating by player season.", "OffRtg", all, "offensiveRating", (row) => fmtNum(row.offensiveRating, 1), (row) => `${fmtNum(row.netRating, 1)} Net`),
        board("defense", "Best Defensive Rating", "Lowest defensive rating by player season.", "DefRtg", defensiveRows, "defensiveRating", (row) => fmtNum(row.defensiveRating, 1), (row) => `${fmtNum(row.netRating, 1)} Net`, true),
        board("usage", "Highest Usage", "Usage rate by player season.", "Usage", usageRows, "usage", (row) => fmtPct(row.usage), (row) => `${fmtNum(row.ppg, 1)} PPG`),
        board("ast-to", "Best AST/TO", "Assist-to-turnover ratio by player season.", "AST/TO", astToRows, "assistsTurnoverRatio", (row) => fmtNum(row.assistsTurnoverRatio, 2), (row) => `${fmtNum(row.apg, 1)} APG`),
        board("oreb", "Best OReb%", "Offensive rebounding percentage by player season.", "OReb%", orebRows, "offensiveReboundPct", (row) => fmtPct(row.offensiveReboundPct), (row) => `${fmtNum(row.rpg, 1)} RPG`),
        board("ts", "Best TS%", "True shooting percentage by player season.", "TS%", trueShootingRows, "trueShooting", (row) => fmtPct(row.trueShooting), (row) => `${fmtNum(row.fgaPerGame, 1)} FGA/G`),
        board("efg", "Best eFG%", "Effective field goal percentage by player season.", "eFG%", fieldGoalRows, "effectiveFieldGoal", (row) => fmtPct(row.effectiveFieldGoal), shotDetail("fieldGoalsMade", "fieldGoalAttempts")),
        board("fgpct", "Best FG%", "Field goal percentage by player season.", "FG%", fieldGoalRows, "fieldGoalPct", (row) => fmtPct(row.fieldGoalPct), shotDetail("fieldGoalsMade", "fieldGoalAttempts")),
        board("twopct", "Best 2P%", "Two-point field goal percentage by player season.", "2P%", twoPointRows, "twoPointPct", (row) => fmtPct(row.twoPointPct), shotDetail("twoPointMade", "twoPointAttempts")),
        board("threepct", "Best 3P%", "Three-point field goal percentage by player season.", "3P%", threePointRows, "threePointPct", (row) => fmtPct(row.threePointPct), shotDetail("threePointMade", "threeAttempts")),
        board("ftpct", "Best FT%", "Free throw percentage by player season.", "FT%", freeThrowRows, "freeThrowPct", (row) => fmtPct(row.freeThrowPct), shotDetail("freeThrowsMade", "freeThrowAttempts")),
        board("fgm", "Most Field Goals", "Made field goals in a Kentucky season.", "FGM", all, "fieldGoalsMade", (row) => fmtNum(row.fieldGoalsMade, 0), shotDetail("fieldGoalsMade", "fieldGoalAttempts")),
        board("threepm", "Most 3-Pointers", "Made threes in a Kentucky season.", "3PM", all, "threePointMade", (row) => fmtNum(row.threePointMade, 0), shotDetail("threePointMade", "threeAttempts")),
        board("ftm", "Most Free Throws", "Made free throws in a Kentucky season.", "FTM", all, "freeThrowsMade", (row) => fmtNum(row.freeThrowsMade, 0), shotDetail("freeThrowsMade", "freeThrowAttempts")),
        board("shooters", "Most Efficient Shooters", "Blend of TS%, eFG%, perimeter accuracy, free throws, and volume.", "Score", all, "efficiencyScore", (row) => fmtNum(row.efficiencyScore, 1), (row) => `${fmtPct(row.trueShooting)} TS`),
        board("freshmen", "Best Freshman Seasons", "Freshman seasons ranked by the BBN Stats player rating.", "Fr.", freshmen, "rating", (row) => fmtNum(row.rating, 1), (row) => `${fmtNum(row.ppg, 1)} PPG`)
      ];
    }

    function renderSummary(rows) {
      const seasons = new Set(rows.map((row) => row.season));
      const players = new Set(rows.map((row) => `${row.athleteId || row.name}-${row.season}`));
      const topRating = sortByMetric(rows, "rating")[0];

      document.getElementById("leaderboard-summary").innerHTML = `
        <article class="card">
          <div class="metric-label">Loaded Seasons</div>
          <div class="metric-value">${escapeHtml(seasons.size)}</div>
          <div class="hero-support">${escapeHtml(seasons.size ? `${seasonLabel(Math.min(...seasons))} to ${seasonLabel(Math.max(...seasons))}` : "No seasons loaded")}</div>
        </article>
        <article class="card">
          <div class="metric-label">Player Seasons</div>
          <div class="metric-value">${escapeHtml(players.size)}</div>
          <div class="hero-support">All loaded Kentucky players</div>
        </article>
        <article class="card">
          <div class="metric-label">Top Rated Season</div>
          <div class="metric-value">${escapeHtml(topRating ? fmtNum(topRating.rating, 1) : "--")}</div>
          <div class="hero-support">${escapeHtml(topRating ? `${topRating.name} | ${seasonLabel(topRating.season)}` : "No eligible rows")}</div>
        </article>
      `;
    }

    function renderBoardTable(board) {
      if (!board.rows.length) {
        return '<div class="empty-state">No eligible player seasons for this board.</div>';
      }

      return `
        <div class="leaderboard-list">
          <div class="leaderboard-list__head" aria-hidden="true">
            <span>Rank</span>
            <span>Player</span>
            <span style="text-align: right;">Season</span>
            <span style="text-align: right;">${escapeHtml(board.badge)}</span>
          </div>
          ${board.rows.map((row, index) => `
            <div class="leaderboard-list__row">
              <span class="leaderboard-list__rank">${index + 1}</span>
              <span class="leaderboard-player">
                <a class="leaderboard-player__name cell-link" href="${escapeHtml(playerUrl(row))}">${escapeHtml(row.name || "Unknown Player")}</a>
                <span class="leaderboard-player__meta">${escapeHtml(`${row.classYear || "--"} | ${row.games} G | ${board.detail(row)}`)}</span>
              </span>
              <span class="leaderboard-list__season">${escapeHtml(seasonLabel(row.season))}</span>
              <span class="leaderboard-list__value">${escapeHtml(board.value(row))}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderLeaderboards() {
      const boards = buildBoards(leaderboardRows);

      renderSummary(leaderboardRows);
      document.getElementById("leaderboard-grid").innerHTML = boards.map((board) => `
        <article class="card leaderboard-card">
          <div class="leaderboard-card__top">
            <div>
              <h2 class="leaderboard-card__title">${escapeHtml(board.title)}</h2>
              <p class="leaderboard-card__copy">${escapeHtml(board.note)}</p>
            </div>
            <span class="leaderboard-badge">${escapeHtml(board.badge)}</span>
          </div>
          ${renderBoardTable(board)}
        </article>
      `).join("");

      document.getElementById("leaderboard-progress").innerHTML = `
        Showing <strong>all players</strong> across <strong>${escapeHtml(String(leaderboardRows.length))}</strong> loaded player seasons.
      `;
    }

    function renderError(message) {
      const safeMessage = escapeHtml(message || "Please try again later.");
      document.getElementById("leaderboard-summary").innerHTML = "";
      document.getElementById("leaderboard-grid").innerHTML = `
        <div class="empty-state">
          <h2 class="card-title">Unable to load leaderboards</h2>
          <p>${safeMessage}</p>
          <button class="btn btn--secondary" type="button" id="retry-leaderboards">Retry</button>
        </div>
      `;
      document.getElementById("retry-leaderboards")?.addEventListener("click", () => window.location.reload());
    }

    async function loadSeasonRows(season) {
      const response = await getHelpers().api.apiFetch("/stats/player/season", { team: TEAM_NAME, season });
      return safeArray(response)
        .filter((row) => row && (row.athleteId || row.name))
        .map((row) => normalizeSeasonRow(row, season));
    }

    async function loadLeaderboardsPage() {
      getHelpers().printer.bindExportButtons?.({ pageName: "leaderboards", elementId: "main-content" });

      try {
        const loaded = [];
        for (const season of LOADED_SEASONS) {
          document.getElementById("leaderboard-progress").textContent = `Loading ${seasonLabel(season)} player seasons...`;
          try {
            loaded.push(...await loadSeasonRows(season));
          } catch (error) {
            // Keep the page useful when one historical API season is unavailable.
          }
        }

        leaderboardRows = loaded.filter((row) => row.games > 0);

        if (!leaderboardRows.length) {
          renderError("No historical Kentucky player seasons are available.");
          return;
        }

        renderLeaderboards();
      } catch (error) {
        renderError(error?.message || "Please try again later.");
      }
    }

    document.addEventListener("DOMContentLoaded", loadLeaderboardsPage);
  </script>
</body>
</html>
