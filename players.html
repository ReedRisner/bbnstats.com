<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBN Stats | Kentucky Roster</title>
  <meta name="description" content="Kentucky Wildcats roster page with grid and table views, player bios, and season averages.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/charts.css">
  <link rel="stylesheet" href="css/print.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    .roster-hero {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .roster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      align-items: stretch;
    }

    .roster-grid > .link-card {
      height: 100%;
    }

    .player-card {
      height: 100%;
      min-height: 260px;
    }

    .player-card__top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .player-card__number {
      color: var(--uk-light-blue);
      font-family: var(--font-display);
      font-size: clamp(2.6rem, 6vw, 4rem);
      line-height: 0.9;
    }

    .player-card__name {
      font-family: var(--font-display);
      font-size: 1.35rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .player-card__meta,
    .player-card__hometown {
      color: var(--text-secondary);
    }

    .player-card__stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: auto;
    }

    .player-mini-stat {
      padding: 12px;
      border: 1px solid rgba(74, 144, 217, 0.16);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
    }

    .player-mini-stat .metric-value {
      font-size: 1.35rem;
    }

    .view-panel[hidden] {
      display: none !important;
    }

    .roster-table th:first-child,
    .roster-table td:first-child {
      width: 70px;
    }

    .roster-table th:nth-child(2),
    .roster-table td:nth-child(2) {
      min-width: 180px;
    }

    .table-note {
      color: var(--text-muted);
      font-size: 0.84rem;
    }

    @media (max-width: 768px) {
      .player-card__stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-page="players">
  <main id="main-content" class="page-shell">
    <div class="export-buttons" style="margin-bottom: 24px;">
      <button class="btn btn--secondary" type="button" data-export-image data-export-target="main-content">Save as Image</button>
      <button class="btn btn--ghost" type="button" data-print-page>Print</button>
    </div>

    <section class="section">
      <div class="hero-banner">
        <div class="roster-hero">
          <div>
            <span class="eyebrow">Roster</span>
            <h1 class="hero-title" id="page-title">Loading Roster</h1>
            <p class="lead">Kentucky player bios and key season averages with card and sortable table views.</p>
          </div>
          <div class="button-group" role="tablist" aria-label="Roster view toggle">
            <button class="btn btn--ghost" type="button" id="grid-toggle" aria-pressed="false">Grid View</button>
            <button class="btn btn--secondary is-active" type="button" id="table-toggle" aria-pressed="true">Table View</button>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div id="roster-state" class="roster-grid">
        <div class="card player-card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--stat"></div><div class="skeleton skeleton--text"></div></div>
        <div class="card player-card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--stat"></div><div class="skeleton skeleton--text"></div></div>
        <div class="card player-card"><div class="skeleton skeleton--title"></div><div class="skeleton skeleton--stat"></div><div class="skeleton skeleton--text"></div></div>
      </div>

      <div id="grid-view" class="view-panel" hidden></div>

        <div id="table-view" class="view-panel" hidden>
          <div class="table-shell">
            <div class="table-toolbar">
              <div>
                <div class="section-title">Roster Table</div>
                <div class="table-note">Default sort is jersey number. Click any sortable header to re-order the roster.</div>
              </div>
            </div>
            <div class="table-responsive">
              <table class="data-table roster-table sortable-table" id="roster-table">
              <thead id="roster-table-head"></thead>
              <tbody id="roster-table-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/print.js"></script>
  <script>
    const TEAM_NAME = "Kentucky";
    let rosterData = [];
    let currentSort = { key: "jersey", asc: true };
    let currentView = "table";
    let tableSortingBound = false;
    const TABLE_COLUMNS = [
      { key: "jersey", label: "No." },
      { key: "name", label: "Player" },
      { key: "classYear", label: "Class" },
      { key: "position", label: "Pos" },
      { key: "height", label: "Height" },
      { key: "weight", label: "Weight" },
      { key: "ppg", label: "PPG" },
      { key: "rpg", label: "RPG" },
      { key: "apg", label: "APG" }
    ];

    function getHelpers() {
      return {
        api: window.BBNStatsApi || {},
        utils: window.BBNStatsUtils || {},
        printer: window.BBNStatsPrint || {}
      };
    }

    function seasonLabel(season) {
      return `${season - 1}-${String(season).slice(-2)} Roster`;
    }

    function safeArray(value) {
      if (Array.isArray(value)) {
        return value;
      }

      if (value && Array.isArray(value.value)) {
        return value.value;
      }

      return [];
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatPosition(position) {
      const value = String(position || "");

      if (value.toLowerCase().startsWith("guard")) {
        return "G";
      }

      if (value.toLowerCase().startsWith("forward")) {
        return "F";
      }

      if (value.toLowerCase().startsWith("center")) {
        return "C";
      }

      return value || "--";
    }

    function getClassYear(player, season) {
      if (typeof getHelpers().utils.getPlayerClassYear === "function") {
        return getHelpers().utils.getPlayerClassYear(player, season);
      }

      const start = Number(player.startSeason || season);
      const years = Math.max(0, season - start);
      const labels = ["Fr.", "So.", "Jr.", "Sr."];
      return labels[Math.min(years, labels.length - 1)] || "Fr.";
    }

    function hometownLabel(player) {
      const city = player.hometown?.city;
      const state = player.hometown?.state;
      if (city && state) {
        return `${city}, ${state}`;
      }
      return city || state || "--";
    }

    function getPerGame(total, games) {
      const totalNum = Number(total || 0);
      const gamesNum = Number(games || 0);
      return gamesNum ? (totalNum / gamesNum).toFixed(1) : "0.0";
    }

    function normalizeRoster(rosterResponse, statsResponse, season) {
      const rosterGroup = safeArray(rosterResponse)[0];
      const rosterPlayers = safeArray(rosterGroup?.players);
      const stats = safeArray(statsResponse);
      const statsMap = new Map(stats.map((player) => [Number(player.athleteId), player]));

      return rosterPlayers
        .map((player) => {
          const statLine = statsMap.get(Number(player.id)) || {};
          const games = Number(statLine.games || 0);

            return {
              ...player,
              statLine,
              classYear: getClassYear(player, season),
              hometownLabel: hometownLabel(player),
              jerseyNumber: Number.parseInt(player.jersey, 10),
              ppg: getPerGame(statLine.points, games),
              rpg: getPerGame(statLine.rebounds?.total, games),
              apg: getPerGame(statLine.assists, games),
              spg: getPerGame(statLine.steals, games),
              bpg: getPerGame(statLine.blocks, games),
              mpg: getPerGame(statLine.minutes, games),
              fgPct: getHelpers().utils.fmtPct(statLine.fieldGoals?.pct),
              threePct: getHelpers().utils.fmtPct(statLine.threePointFieldGoals?.pct),
              ftPct: getHelpers().utils.fmtPct(statLine.freeThrows?.pct),
              usage: `${getHelpers().utils.fmtNum(statLine.usage, 1)}%`,
              offensiveRating: getHelpers().utils.fmtNum(statLine.offensiveRating, 1),
              defensiveRating: getHelpers().utils.fmtNum(statLine.defensiveRating, 1),
              netRating: getHelpers().utils.fmtNum(statLine.netRating, 1),
              PORPAG: getHelpers().utils.fmtNum(statLine.PORPAG, 1),
              winShares: getHelpers().utils.fmtNum(statLine.winShares?.total, 1),
              wsPer40: getHelpers().utils.fmtNum(statLine.winShares?.totalPer40, 3),
              effectiveFieldGoalPct: getHelpers().utils.fmtPct(statLine.effectiveFieldGoalPct),
              trueShootingPct: getHelpers().utils.fmtPct(statLine.trueShootingPct),
              freeThrowRate: getHelpers().utils.fmtNum(statLine.freeThrowRate, 1),
              offensiveReboundPct: getHelpers().utils.fmtNum(statLine.offensiveReboundPct, 1),
              assistsTurnoverRatio: getHelpers().utils.fmtNum(statLine.assistsTurnoverRatio, 2)
            };
        })
        .sort((a, b) => {
          const aJersey = Number.isNaN(a.jerseyNumber) ? Number.MAX_SAFE_INTEGER : a.jerseyNumber;
          const bJersey = Number.isNaN(b.jerseyNumber) ? Number.MAX_SAFE_INTEGER : b.jerseyNumber;
          return aJersey - bJersey;
        });
    }

    function renderGrid(players) {
      const gridView = document.getElementById("grid-view");
      gridView.innerHTML = `
        <div class="roster-grid">
          ${players.map((player) => `
            <a class="link-card" href="player.html?id=${encodeURIComponent(player.id)}&season=${encodeURIComponent(getHelpers().utils.getSeason())}">
              <article class="card player-card stack stack--lg">
                <div class="player-card__top">
                  <div>
                    <div class="metric-label">${escapeHtml(player.classYear)}</div>
                    <div class="player-card__name">${escapeHtml(player.name)}</div>
                    <div class="player-card__meta">${escapeHtml(`${formatPosition(player.position)} | ${getHelpers().utils.heightInches(player.height)} | ${player.weight || "--"} lbs`)}</div>
                    <div class="player-card__hometown">${escapeHtml(player.hometownLabel)}</div>
                  </div>
                  <div class="player-card__number">${escapeHtml(player.jersey || "--")}</div>
                </div>
                <div class="player-card__stats">
                  <div class="player-mini-stat">
                    <div class="metric-label">PPG</div>
                    <div class="metric-value">${escapeHtml(player.ppg)}</div>
                  </div>
                  <div class="player-mini-stat">
                    <div class="metric-label">RPG</div>
                    <div class="metric-value">${escapeHtml(player.rpg)}</div>
                  </div>
                  <div class="player-mini-stat">
                    <div class="metric-label">APG</div>
                    <div class="metric-value">${escapeHtml(player.apg)}</div>
                  </div>
                </div>
              </article>
            </a>
          `).join("")}
        </div>
      `;
    }

    function renderTableHead() {
      const thead = document.getElementById("roster-table-head");
      thead.innerHTML = `
        <tr>
          ${TABLE_COLUMNS.map((column) => `<th data-sort="${column.key}">${escapeHtml(column.label)}</th>`).join("")}
        </tr>
      `;
    }

    function renderTable(players) {
      const tbody = document.getElementById("roster-table-body");

      renderTableHead();

      tbody.innerHTML = players.map((player) => `
          <tr>
            ${TABLE_COLUMNS.map((column) => {
              const valueMap = {
                jersey: player.jersey || "--",
                name: `<a class="cell-link" href="player.html?id=${encodeURIComponent(player.id)}&season=${encodeURIComponent(getHelpers().utils.getSeason())}">${escapeHtml(player.name)}</a>`,
                classYear: player.classYear,
                position: formatPosition(player.position),
                height: getHelpers().utils.heightInches(player.height),
                weight: player.weight || "--",
                ppg: player.ppg,
                rpg: player.rpg,
                apg: player.apg
              };

              const value = valueMap[column.key] ?? "--";
              const cellClass = column.key === "jersey" ? "cell-strong" : column.key === "name" ? "" : "cell-number";
              return `<td class="${cellClass}">${column.key === "name" ? value : escapeHtml(value)}</td>`;
            }).join("")}
          </tr>
      `).join("");
    }

    function getSortValue(player, key) {
      switch (key) {
        case "jersey":
          return Number.isNaN(player.jerseyNumber) ? Number.MAX_SAFE_INTEGER : player.jerseyNumber;
        case "name":
          return player.name || "";
        case "classYear":
          return player.classYear || "";
        case "position":
          return formatPosition(player.position);
        case "height":
          return Number(player.height || 0);
        case "weight":
          return Number(player.weight || 0);
        case "ppg":
          return Number(player.ppg || 0);
        case "rpg":
          return Number(player.rpg || 0);
        case "apg":
          return Number(player.apg || 0);
        default:
          return "";
      }
    }

    function sortRoster(key, asc) {
      rosterData = rosterData.slice().sort((a, b) => {
        const aValue = getSortValue(a, key);
        const bValue = getSortValue(b, key);

        if (typeof aValue === "string" || typeof bValue === "string") {
          return asc
            ? String(aValue).localeCompare(String(bValue))
            : String(bValue).localeCompare(String(aValue));
        }

        return asc ? aValue - bValue : bValue - aValue;
      });

      currentSort = { key, asc };
      renderCurrentView();
      updateSortIndicators();
    }

    function updateSortIndicators() {
      document.querySelectorAll("#roster-table th[data-sort]").forEach((header) => {
        if (header.dataset.sort === currentSort.key) {
          header.dataset.asc = String(currentSort.asc);
        } else {
          header.removeAttribute("data-asc");
        }
      });
    }

    function renderCurrentView() {
      const rosterState = document.getElementById("roster-state");
      rosterState.hidden = true;
      rosterState.innerHTML = "";
      document.getElementById("grid-view").hidden = currentView !== "grid";
      document.getElementById("table-view").hidden = currentView !== "table";
      renderGrid(rosterData);
      renderTable(rosterData);
    }

    function setView(view) {
      currentView = view;
      const gridToggle = document.getElementById("grid-toggle");
      const tableToggle = document.getElementById("table-toggle");

      gridToggle.className = `btn ${view === "grid" ? "btn--secondary is-active" : "btn--ghost"}`;
      tableToggle.className = `btn ${view === "table" ? "btn--secondary is-active" : "btn--ghost"}`;
      gridToggle.setAttribute("aria-pressed", String(view === "grid"));
      tableToggle.setAttribute("aria-pressed", String(view === "table"));

      renderCurrentView();
    }

    function bindTableSorting() {
      if (tableSortingBound) {
        return;
      }

      const tableHead = document.getElementById("roster-table-head");

      tableHead.addEventListener("click", (event) => {
        const header = event.target.closest("th[data-sort]");

        if (!header) {
          return;
        }

        const key = header.dataset.sort;
        const asc = currentSort.key === key ? !currentSort.asc : true;
        sortRoster(key, asc);
      });

      tableSortingBound = true;
    }

    function renderError(message) {
      document.getElementById("roster-state").innerHTML = `
        <div class="error-state section-state">
          <h3 class="card-title">Unable to load roster</h3>
          <p>${escapeHtml(message || "Please try again later.")}</p>
          <button class="btn btn--secondary" type="button" id="retry-roster">Retry</button>
        </div>
      `;

      document.getElementById("retry-roster")?.addEventListener("click", () => {
        window.location.reload();
      });
    }

    async function loadRosterPage() {
      const { api, utils, printer } = getHelpers();
      const season = typeof utils.getSeason === "function" ? utils.getSeason() : 2026;

      printer.bindExportButtons({ pageName: "players", elementId: "main-content" });
      document.getElementById("page-title").textContent = seasonLabel(season);

      document.getElementById("grid-toggle").addEventListener("click", () => setView("grid"));
      document.getElementById("table-toggle").addEventListener("click", () => setView("table"));
      try {
        const rosterResponse = await api.apiFetch("/teams/roster", { team: TEAM_NAME, season });
        const statsResponse = await api.apiFetch("/stats/player/season", { team: TEAM_NAME, season });

        rosterData = normalizeRoster(rosterResponse, statsResponse, season);

        if (!rosterData.length) {
          renderError("No roster data is available for this season.");
          return;
        }

        bindTableSorting();
        setView("table");
      } catch (error) {
        renderError(error?.message || "Please try again later.");
      }
    }

    document.addEventListener("DOMContentLoaded", loadRosterPage);
  </script>
</body>
</html>
